# Configuration Alembic pour Cold Call Platform
# Utilise SQLAlchemy async (asyncpg)

[alembic]
# Chemin vers le dossier des migrations
script_location = migrations

# Template pour les fichiers de migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Timezone pour les timestamps de migration
timezone = UTC

# Separateur pour les versions paralleles (pas utilise en mode lineaire)
# version_path_separator = os

# La URL de la DB est injectee dynamiquement dans env.py (pas en dur ici)
# sqlalchemy.url est override par env.py via config.set_main_option()
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
